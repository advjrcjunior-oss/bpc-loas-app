openapi: 3.0.0
info:
  title: LegalMail Public API
  version: "1.0.0"
  description: |
    API pública destinada à integração com a plataforma LegalMail.

    - Limite de 30 requisições por minuto.
    - A detecção de polling resultará no **bloqueio do workspace por 7 dias**.
    - Em caso de reincidência, o bloqueio será **permanente**.

    - A chave de API deve ser enviada como parâmetro `api_key` em **todas** as requisições.
    - A chave pode ser obtida no menu "Integrações" da plataforma LegalMail.

    Para evitar penalizações e melhorar a integração, considere as seguintes boas práticas:
    - Utilize estratégias baseadas em webhooks (quando disponíveis) para evitar polling.
    - Trate os erros HTTP adequadamente, especialmente os relacionados à taxa de requisições (status 429).
    - Monitore o consumo de requisições para evitar bloqueios inesperados.
servers:
  - url: https://app.legalmail.com.br/
tags:
  - name: Processes
    description: Operações relacionadas aos processos
  - name: Petitions Initial
    description: Endpoints para petições iniciais
  - name: Petitions Intermediate
    description: Endpoints para petições intermediárias
  - name: Petitions
    description: Endpoints para petições
  - name: Workspace
    description: Gestão de workspaces e notificações
  - name: Docs Generator
    description: Operações do gerador de documentos (Google Docs)
  - name: Attachments
    description: Consulta de tipos de anexos e tribunais
  - name: Users
    description: Operações relacionadas aos usuários do workspace. Senhas devem ser enviadas em formato MD5.
  - name: Parts
    description: Gerenciamento das partes processuais
  - name: Imports
    description: Solicitações públicas de importação de processos
  - name: Autos
    description: Atualização e download de autos de processos
paths:
  /api/v1/imports/request:
    post:
      tags:
        - Imports
      summary: Solicitar importação de processos (avulsa ou em lote)
      description: |-
        Passo a passo recomendado para integrações:
        1. Busque a classe em `/api/v1/imports/classes` e use o `classe_id` retornado.
        2. Descubra os sistemas compatíveis para o número informado com `/api/v1/imports/allowed-systems` e escolha o `sistema` permitido.
        3. Envie a requisição abaixo com o `numero`, `tribunal`, `sistema`, `classe_id` e `certificado_id` desejados.
        Replica o fluxo de solicitações da plataforma, incluindo validação de credenciais, sistemas habilitados e fila.
        Se o número estiver no padrão CNJ, ele deve corresponder ao tribunal informado, caso contrário o item é recusado.
        Caso já exista um pedido do mesmo processo e classe com status 0 ou 10 para o workspace, o item é retornado como warning sem duplicar.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pedidos:
                  type: array
                  minItems: 1
                  description: Lista de pedidos a serem importados
                  items:
                    type: object
                    properties:
                      numero:
                        type: string
                        description: Número completo do processo
                      tribunal:
                        type: string
                        description: Tribunal (ex. TJSP)
                      sistema:
                        type: string
                        description: Sistema do tribunal (pje, projudi, esaj, eproc)
                      classe_id:
                        type: string
                        description: Identificador retornado por `/api/v1/imports/classes`
                      certificado_id:
                        type: integer
                        description: Identificador do certificado a ser utilizado
                    required:
                      - numero
                      - tribunal
                      - sistema
                      - classe_id
              example:
                pedidos:
                  - numero: "0000000-00.2024.1.00.0000"
                    tribunal: TJSP
                    sistema: esaj
                    classe_id: "143"
                    certificado_id: 10
      responses:
        "200":
          description: Solicitações registradas
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                tipo_pedido: Lote
                hash: abc123
                resultados:
                  - numero: "0000000-00.2024.1.00.0000"
                    hash: abc123
                    status: success
                    message: Solicitação registrada com sucesso.
                    reactivated: false
                    workspace_reimported_count: null
        "422":
          description: "Nenhum pedido aceito (ex.: credencial inválida, sistema incompatível ou sistema não habilitado para o certificado)"
          content:
            application/json:
              schema:
                type: object
              example:
                status: error
                tipo_pedido: Avulso
                hash: 5b605730-6c84-4906-8783-bfa92abf2877
                resultados:
                  - numero: "0004849-93.2025.8.26.0016"
                    hash: 5b605730-6c84-4906-8783-bfa92abf2877
                    status: error
                    message: Não foi possível solicitar a importação. Sistema não habilitado para o certificado.
        "400":
          description: Erro de validação ou credencial ausente

  /api/v1/imports/status:
    get:
      tags:
        - Imports
      summary: Consultar pedidos de importação
      description: Informe `hash` para recuperar um lote ou `numero` para buscar pedidos por processo. O campo `motivo_falha` usa `processos_importar.mensagem` e, em falhas sem mensagem, retorna `Não localizado após diversas tentativas`.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: hash
          required: false
          description: Hash do lote de importação
          schema:
            type: string
        - in: query
          name: numero
          required: false
          description: Número do processo (busca todos os pedidos do número)
          schema:
            type: string
      responses:
        "200":
          description: Pedidos encontrados
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                hash: abc123
                pedidos:
                  - numero: "5048777-78.2024.4.03.6301"
                    tribunal: TRF-3
                    status: Aguardando habilitação
                    motivo_falha: Certificado digital inválido para o tribunal selecionado.
                    classe: Recurso Ordinário
                    fonte_pedido: api
                    tipo_pedido: Avulso
                    fk_certificado: "3212"
                    sistema_tribunal: pje
                    total_tentativas: 0
        "400":
          description: Parâmetros inválidos ou faltantes

  /api/v1/imports/classes:
    get:
      tags:
        - Imports
      summary: Buscar classes processuais
      description: Retorna classes pelo termo informado, avaliando nome ou abreviatura.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: term
          required: false
          description: Termo de busca (nome ou abreviatura)
          schema:
            type: string
      responses:
        "200":
          description: Lista de classes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    nome:
                      type: string
                    abreviatura:
                      type: string
                  required:
                    - id
                    - nome
                    - abreviatura
              example:
                - id: 143
                  nome: Recurso
                  abreviatura: RC

  /api/v1/imports/allowed-systems:
    get:
      tags:
        - Imports
      summary: Listar sistemas permitidos pelo número do processo
      description: Identifica o tribunal pelo número CNJ informado e retorna os sistemas cadastrados para importação pública.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: numero
          required: true
          description: Número completo do processo
          schema:
            type: string
      responses:
        "200":
          description: Sistemas permitidos encontrados
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                tribunal: TJSP
                sistemas_permitidos:
                  - nome: e-SAJ
                    value: esaj
                  - nome: e-Proc
                    value: eproc
                  - nome: Projudi SEEU
                    value: projudi_seeu
        "400":
          description: Número do processo ausente
        "422":
          description: Número inválido ou tribunal não identificado
        "404":
          description: Nenhum sistema encontrado para o tribunal

  /api/v1/imports/cancel:
    post:
      tags:
        - Imports
      summary: Cancelar pedidos pendentes por hash
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
              schema:
                type: object
              properties:
                hash:
                  type: string
                  description: Hash do lote de pedidos
              required:
                - hash
              example:
                hash: abc123
      responses:
        "200":
          description: Quantidade de pedidos cancelados (status 0 ou 10)
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                cancelados: 2
        "400":
          description: Hash ausente ou inválido

  /api/v1/process/all:
    get:
      tags:
        - Processes
      summary: Listar processos por api_key
      description: Retorna todos os processos vinculados ao workspace informado. Caso os parâmetros offset e limit não sejam enviados, serão utilizados os valores padrão offset=0 e limit=50.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: offset
          required: false
          description: Offset para paginação
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          required: false
          description: Limite de resultados (máximo 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Lista de processos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - idprocessos: 12
                  hash_processo: "abc123"
                  numero_processo: "0000000-00.2024.8.26.0001"
                  juizo: "1ª Vara Cível"
                  valor_causa: "10000.00"
                  data_distribuicao: "2024-01-10"
                  tribunal: TJSP
                  processo_tema: "Tema Exemplo"
                  sistema_tribunal: PJe
                  poloativo_nome: "Autor Exemplo"
                  tema_nome: "Tema Exemplo"
                  polopassivo_nome: "Réu Exemplo"
                  abreviatura_classe: PROC
                  foro: "Foro Central"
                  nome_classe: "Procedimento Comum Cível"
                  inbox_atual: "Arquivo"
        "429":
          description: Limite de requisições excedido (30 por minuto)
  /api/v1/workspace/notifications/endpoint:
    post:
      tags:
        - Workspace
      summary: Cadastrar endpoint para notificacoes
      description: |
        Registra o URL para o qual a LegalMail enviará atualizações.
        Serão retornadas cada nova intimação importada no workspace,
        após o processo ser atualizado por nossos robôs.

        Ao cadastrar o endpoint, sempre que houver atualização você receberá
        um payload com o objeto abaixo (exemplo). O campo `params` é uma lista
        de objetos e cada item contém os dados do processo e as movimentações do dia
        em `documento` (array de movimentações). Em cada movimentação, o campo `tipo`
        indica o formato do conteúdo e pode ser `text` ou `pdf`:

        ```json
        {
          "clientkey": "SUA_KEY_ENDPOINT",
          "params": [
            {
              "inbox_id": "123456",
              "inbox_uri": "https://app.legalmail.com.br/inbox/entrada?encryptedId=123456",
              "tribunal": "TJSP",
              "sistema_tribunal": "esaj",
              "instancia": "1",
              "uf": "SP",
              "numero_processo": "0000000-00.2024.1.00.0000",
              "classe_processo": "PROC",
              "polo_ativo": "Autor Exemplo",
              "polo_passivo": "Réu Exemplo",
              "documento": [
                {
                  "tipo": "text",
                  "link": "https://app.legalmail.com.br/documentos/123",
                  "text": "Texto da movimentação",
                  "intimation_date": "2024-01-01",
                  "title": "Título da movimentação",
                  "id": "123",
                  "movement_date": "2024-01-01"
                }
              ]
            }
          ]
        }
        ```

        Além das atualizações de movimentações/intimações, quando um protocolo for
        finalizado, o endpoint cadastrado também poderá receber o evento abaixo:

        ```json
        {
          "clientkey": "SUA_KEY_ENDPOINT",
          "params": [
            {
              "event": "protocolo_finalizado",
              "idpeticoes": 123,
              "idprocessos": 456,
              "numero_processo": "0000000-00.2024.8.26.0001",
              "type": "Inicial",
              "receipt_link": "https://..."
            }
          ]
        }
        ```
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: endpoint
          required: true
          description: URL do endpoint que receberá as notificações
          schema:
            type: string
        - in: query
          name: key_endpoint
          required: false
          description: Chave de segurança opcional para o endpoint
          schema:
            type: string
        - in: query
          name: nome_aplicacao
          required: true
          description: Nome da aplicação que receberá as notificações
          schema:
            type: string
      responses:
        "200":
          description: Endpoint cadastrado com sucesso
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
        "400":
          description: Erro de validação (chave inválida ou parâmetros ausentes)
          content:
            application/json:
              schema:
                type: object
              examples:
                chave_invalida:
                  summary: Chave de API inválida
                  value:
                    status: error
                    message: Chave de api invalida.
                parametros_ausentes:
                  summary: Parâmetros ausentes
                  value:
                    status: error
                    message: Parametros ausentes.
        "401":
          description: API key not provided

  /api/v1/professions:
    get:
      tags:
        - Parts
      summary: Listar profissões
      description: Retorna todas as profissões aceitas pela API.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de profissões
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - deProfissao: Advogado
                  deFeminina: Advogada
                  cdProfissao: 1
        "401":
          description: API key not provided

  /api/v1/issuing-agencies:
    get:
      tags:
        - Parts
      summary: Listar órgãos expedidores
      description: Retorna todos os órgãos expedidores aceitos pela API.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de órgãos expedidores
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - value: SSP
                  label: SSP - Secretaria de Segurança Pública
        "401":
          description: API key not provided

  /api/v1/workspace/certificates:
    get:
      tags:
        - Workspace
      summary: Listar certificados cadastrados
      description: Recupera a relação de certificados disponíveis no workspace.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de certificados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - idcertificados: 1
                  advogado_nome: Fulano de Tal
                  vencimento: "2025-12-31"
        "401":
          description: API key not provided
  /api/v1/process/detail:
    get:
      tags:
        - Processes
      summary: Obter dados de um processo especifico
      description: |
        Informe **apenas um** dos parâmetros `numero_processo` ou `idprocesso`.
        O `api_key` é obrigatório para identificar o workspace.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: numero_processo
          required: false
          description: Número completo do processo
          schema:
            type: string
        - in: query
          name: idprocesso
          required: false
          description: ID interno do processo
          schema:
            type: integer
      responses:
        "200":
          description: Dados do processo
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idprocessos:
                      type: integer
                      description: Identificador interno do processo
                    numero_processo:
                      type: string
                      description: Número completo do processo
                    hash_processo:
                      type: string
                      description: Hash do processo
                    foro:
                      type: string
                      description: Foro de tramitação
                    last_import:
                      type: string
                      format: date-time
                      description: Data e hora da última importação de dados
                    poloativo_nome:
                      type: string
                      description: Nome do polo ativo
                    polopassivo_nome:
                      type: string
                      description: Nome do polo passivo
                    nome_classe:
                      type: string
                      description: Nome da classe processual
                    abreviatura_classe:
                      type: string
                      description: Abreviatura da classe processual
                    inbox_atual:
                      type: string
                      description: Status atual do processo
                    juizo:
                      type: string
                      description: Juízo responsável
                    valor_causa:
                      type: number
                      description: Valor da causa
                    data_distribuicao:
                      type: string
                      format: date
                      description: Data de distribuição do processo (AAAA-MM-DD)
                    tribunal:
                      type: string
                      description: Tribunal em que o processo tramita
                    processo_tema:
                      type: string
                      description: Tema do processo
                    sistema_tribunal:
                      type: string
                      description: Sistema do tribunal
                    data_prazo:
                      type: string
                      format: date
                      description: Data limite do prazo do processo (AAAA-MM-DD)
              example:
                - idprocessos: 12
                  numero_processo: "0000000-00.2024.8.26.0001"
                  hash_processo: "abc123"
                  foro: "Foro Central"
                  last_import: "2024-07-01 14:23:00"
                  valor_causa: 10000.0
                  data_distribuicao: "2024-01-10"
                  data_prazo: "2024-07-15"
                  poloativo_nome: "Autor Exemplo"
                  polopassivo_nome: "Réu Exemplo"
                  nome_classe: "Procedimento Comum Cível"
                  abreviatura_classe: "ProceComCiv"
                  inbox_atual: "Arquivo"

  /api/v1/process/delete:
    post:
      tags:
        - Processes
      summary: Excluir processo
      description: |
        Exclui o processo informado e encerra o monitoramento de intimações.
        Se o processo for apenas excluído, ele ainda pode ser reimportado caso surja uma nova intimação.
        Ao informar `block_process` como `true`, o processo também é bloqueado e qualquer futura intimação será ignorada.

        Um mesmo processo pode ser excluído no máximo **3 vezes**. Após atingir esse limite, a API retorna erro.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idprocessos:
                  type: integer
                  description: Identificador interno do processo
                block_process:
                  type: boolean
                  description: Indica se o processo deve ser bloqueado após a exclusão
              required:
                - idprocessos
            example:
              idprocessos: 123
              block_process: true
      responses:
        "200":
          description: Resultado da exclusão
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    nullable: true
              examples:
                success:
                  summary: Processo excluído
                  value:
                    status: success
                error:
                  summary: Erro na exclusão
                  value:
                    status: error
                    message: Processo não encontrado, tente novamente.

  /api/v1/process/autos:
    get:
      tags:
        - Processes
      summary: Listar autos do processo
      description: |
        Retorna as movimentações classificadas como autos vinculadas a um processo específico do workspace.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idprocesso
          required: true
          description: Identificador do processo dentro do workspace
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Lista de autos do processo
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idmovimentacoes:
                      type: integer
                      description: Identificador da movimentação
                    fk_processo:
                      type: integer
                      description: Identificador do processo
                    titulo:
                      type: string
                      description: Título da movimentação
                    data_movimentacao:
                      type: string
                      format: date
                      description: Data da movimentação
                    tipo:
                      type: string
                      description: Tipo do documento (principal ou anexo)
                    hash_documento:
                      type: string
                      description: Hash do documento armazenado
              example:
                - idmovimentacoes: 123
                  fk_processo: 456
                  titulo: "Petição inicial"
                  data_movimentacao: "2024-05-01"
                  tipo: "principal"
                  hash_documento: "e3b0c44298fc1c149afbf4c8996fb924"
        "400":
          description: Parâmetros ausentes
        "404":
          description: Chave de API inválida ou autos não encontrados
        "422":
          description: Identificador do processo inválido
        "429":
          description: Limite de requisições excedido (30 por minuto)

  /api/v1/process/movement/url:
    get:
      tags:
        - Processes
      summary: Obter URL do documento da movimentação
      description: Retorna a URL S3 do documento associado a uma movimentação específica do processo.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idmovimentacoes
          required: true
          description: Identificador da movimentação
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: URL S3 do documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  s3_url:
                    type: string
                    description: URL pré-assinada do arquivo na S3 pronta para download
                    example: "https://irbotfiles.s3.sa-east-1.amazonaws.com/uploads/processos/documento.pdf?X-Amz-Expires=86400&X-Amz-Signature=exemplo"
        "400":
          description: Parâmetros ausentes
        "404":
          description: Chave de API inválida ou movimentação não encontrada
        "422":
          description: Identificador da movimentação inválido
        "429":
          description: Limite de requisições excedido (30 por minuto)

  /api/v1/process/autos/update:
    post:
      tags:
        - Autos
      summary: Solicitar atualização de autos
      description: |-
        Solicita a atualização de autos do processo replicando o fluxo usado na plataforma:

        1. Envie o `idprocessos` do processo retornado pela listagem.
        2. A chamada é recusada se já houver atualização pendente ou se houve solicitação nos últimos 3 dias para o mesmo processo.
        3. Use este endpoint após consultar o processo e confirmar que há novas movimentações a sincronizar.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idprocessos:
                  type: integer
                  description: Identificador do processo no workspace
              required:
                - idprocessos
            example:
              idprocessos: 123
      responses:
        "200":
          description: Solicitação registrada
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                message: Atualização de autos solicitada com sucesso
        "400":
          description: Parâmetros inválidos ou credencial ausente
        "409":
          description: Já existe atualização em andamento para o processo
        "429":
          description: Existe solicitação recente (menos de 3 dias) para o processo

  /api/v1/process/autos/download/request:
    post:
      tags:
        - Autos
      summary: Solicitar download completo dos autos
      description: |-
        Enfileira a geração de um PDF único com todos os autos do processo, usando o mesmo fluxo da plataforma (fila SQS + Lambda).

        1. Informe o `idprocessos` retornado pela listagem de processos.
        2. A solicitação é recusada se o processo não pertencer ao workspace ou não possuir autos aptos para download.
        3. O processamento ocorre em segundo plano; consulte o status em `/api/v1/process/autos/download/status`.
        4. É permitido apenas um download completo a cada 3 dias; solicitações dentro do intervalo retornam erro orientando a usar o download individual de autos.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idprocessos:
                  type: integer
                  description: Identificador do processo no workspace
              required:
                - idprocessos
            example:
              idprocessos: 456
      responses:
        "200":
          description: Solicitação registrada
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                job_id: merge_671234abcd
                message: Download dos autos solicitado. Salve o job_id para consultar o status do job solicitado em /api/v1/process/autos/download/status.
        "400":
          description: Parâmetros ausentes ou inválidos
        "404":
          description: Processo não encontrado para o workspace ou sem autos disponíveis
        "409":
          description: Já existe um download dos autos em andamento para o processo
        "429":
          description: Existe download recente (menos de 3 dias); utilize o download individual dos autos ou aguarde 3 dias

  /api/v1/process/autos/download/status:
    get:
      tags:
        - Autos
      summary: Consultar status do download dos autos
      description: Retorna a situação mais recente do job de merge dos autos e, se concluído, a URL S3 pré-assinada do PDF.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idprocessos
          required: true
          description: Identificador do processo no workspace
          schema:
            type: integer
            minimum: 1
        - in: query
          name: job_id
          required: false
          description: Identificador específico do job (opcional; se ausente, usa o último job válido do processo)
          schema:
            type: string
      responses:
        "200":
          description: Status do download
          content:
            application/json:
              schema:
                type: object
              examples:
                Em processamento:
                  value:
                    status: success
                    job_id: merge_671234abcd
                    job_status: PENDING
                    output_url: null
                    message: Arquivo sendo preparado. Tente novamente em instantes.
                Concluido:
                  value:
                    status: success
                    job_id: merge_671234abcd
                    job_status: FINISHED
                    output_url: https://legalmail.s3-sa-east-1.amazonaws.com/uploads/legalmail/movimentacoes/456/0000000-00.2024.8.26.0001-20240710_153000.pdf
                    last_merge_at: "2024-07-10 15:30:00"
                    message: Arquivo pronto para download.
        "404":
          description: Processo inválido ou nenhum job localizado
        "400":
          description: Parâmetros ausentes
        "429":
          description: Limite de requisições excedido (30 por minuto)

  /api/v1/petition/intermediate:
    post:
      tags:
        - Petitions Intermediate
      summary: Criar petição intermediária
      description: |
        Cria uma petição intermediária.
        Salve o `idpeticoes`, que deve ser usado nas
        rotas de envio de anexos e do arquivo principal.

        Fluxo recomendado:
        1. `POST /api/v1/petition/intermediate` para gerar o identificador da petição.
        2. `POST /api/v1/petition/file` enviando o PDF principal com `idpeticoes` e `idprocessos` retornados.
        3. `POST /api/v1/petition/attachments` para anexos complementares, quando necessário.
        4. `POST /api/v1/petition/intermediate/send` definindo `fk_peca` e demais dados do protocolo para concluir o envio.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fk_processo:
                  type: integer
                  description: Identificador do processo já existente no workspace
                tutela_antecipada:
                  type: integer
                fk_certificado:
                  type: integer
                  description: Identificador do certificado ativo pertencente a um usuário do workspace
                custas_recolhidas:
                  type: integer
                numero_guia:
                  type: array
                  description: Lista das numerações das guias de custas recolhidas
                  items:
                    type: string
              required:
                - fk_processo
                - fk_certificado
            example:
              fk_processo: 456
              fk_certificado: 34
              tutela_antecipada: 0
              custas_recolhidas: 1
              numero_guia:
                - "123456789"
                - "987654321"
      responses:
        "200":
          description: Resultado da operação
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash_peticao:
                    type: string
                  idpeticoes:
                    type: integer
              examples:
                sucesso:
                  summary: Petição criada
                  value:
                    hash_peticao: "9fa0d4c3f2"
                    idpeticoes: 123
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                json_invalido:
                  summary: JSON inválido
                  value:
                    error: Invalid JSON
                campo_obrigatorio:
                  summary: Campo obrigatório ausente
                  value:
                    error: "Missing field: fk_certificado"
        "401":
          description: API key not provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: API key not provided
        "404":
          description: Workspace, processo ou certificado não localizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                workspace_inexistente:
                  summary: Workspace não encontrado
                  value:
                    error: API key not found
                processo_invalido:
                  summary: Processo não pertence ao workspace
                  value:
                    error: "Processo não encontrado para este workspace"
        "405":
          description: Método não permitido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Method not allowed

  /api/v1/petition/initial:
    post:
      tags:
        - Petitions Initial
      summary: Criar nova petição inicial
      description: |
        Cria uma ou mais petições vinculadas ao workspace do `api_key` informado.

        - O corpo deve ser um objeto JSON ou uma lista de objetos. Objetos únicos são tratados como uma lista com um item.
        - Os campos `tribunal` e `instancia` são obrigatórios. O sistema do tribunal (`sistema`) é opcional para casos em que o tribunal possui apenas um sistema, porém será rejeitado se não for enviado e não puder ser inferido automaticamente.
        - Quando enviados, `tribunal` e `sistema` devem corresponder exatamente aos valores disponibilizados no endpoint `GET /api/v1/petition/tribunals`, respeitando siglas e nomes padronizados.
        - A instância aceita apenas os valores `1` (1º grau), `2` (2º grau) ou `recursal` (Turmas Recursais).
        - É possível informar IDs de partes já existentes (`idpoloativo`, `idpolopassivo`). Cada campo aceita um único identificador ou uma lista (array) de IDs. As partes podem ser criadas a partir do endpoint `POST /api/v1/parts`.
        - Informe `ufTribunal` apenas quando a detecção automática da UF do tribunal não for possível.
        - Cada item retorna o status individual (`sucesso` ou `erro`), a mensagem de processamento e os dados resultantes ou rejeitados.

        Fluxo recomendado:
        1. `POST /api/v1/petition/initial` com os dados processuais para gerar `idpeticoes` e `idprocessos` de cada item aceito.
        2. `POST /api/v1/petition/file` anexando o PDF obrigatório de cada petição criada.
        3. `POST /api/v1/petition/attachments` para anexos complementares, informando `fk_documentos_tipos` quando necessário.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              - tribunal: TJSP
                instancia: "1"
                sistema: esaj
                idpoloativo:
                  - 123
                  - 789
                idpolopassivo:
                  - 456
              - tribunal: TJBA
                instancia: "recursal"
                sistema: projudi
      responses:
        "200":
          description: Resultado do processamento de cada petição enviada
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    status:
                      type: string
                      description: Resultado individual da criação
                      enum:
                        - sucesso
                        - erro
                    mensagem:
                      type: string
                      description: Mensagem detalhando o resultado do item
                    dados:
                      description: Dados retornados pelo processamento ou payload rejeitado
                      nullable: true
                      type: object
              example:
                - status: sucesso
                  mensagem: Processado com sucesso.
                  dados:
                    idpeticoes: 789
                    idprocessos: 456
                - status: erro
                  mensagem: Campos obrigatórios ausentes tribunal e instancia.
                  dados:
                    tribunal: ""
                    instancia: null
        "400":
          description: JSON inválido ou formato não suportado
        "401":
          description: API key not provided
        "429":
          description: Limite de requisições excedido (30 por minuto)
    put:
      tags:
        - Petitions Initial
      summary: Atualizar informações da petição inicial
      description: |
        Permite editar os dados do processo associado a uma petição já existente,
        reaproveitando a lógica interna de validação utilizada na criação de
        petições iniciais. Todos os campos obrigatórios são validados antes da
        atualização.
        - O tribunal e o sistema informados passam pelas mesmas validações da criação de petições iniciais.
        - É possível atualizar as partes vinculadas ao processo através dos campos `idpoloativo` e `idpolopassivo`, aceitando um único identificador ou uma lista de IDs.
        - Quando `tipo_distribuicao` for informado como `Por dependência`, é obrigatório enviar `processo_referencia` e `fundamento_legal`. O campo `processo_referencia`, quando enviado, deve obedecer ao padrão CNJ (`NNNNNNN-NN.NNNN.N.NN.NNNN`).
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idpeticoes
          required: true
          description: ID da petição que será atualizada
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ufTribunal
                - tribunal
                - sistema
                - instancia
                - comarca
                - classe
                - assunto
                - valorCausa
                - distribuicao
              properties:
                ufTribunal:
                  type: string
                tribunal:
                  type: string
                sistema:
                  type: string
                instancia:
                  type: string
                comarca:
                  type: string
                competencia:
                  type: string
                  nullable: true
                area:
                  type: string
                  nullable: true
                classe:
                  type: string
                assunto:
                  type: string
                rito:
                  type: string
                  nullable: true
                tipo_processo:
                  type: string
                  nullable: true
                  description: Tipo do processo segundo a classificação do tribunal.
                tipo_justica:
                  type: string
                  nullable: true
                valorCausa:
                  type: number
                  format: float
                liminar:
                  type: boolean
                sigilo:
                  type: boolean
                motivo_sigilo:
                  type: string
                  nullable: true
                gratuidade:
                  type: boolean
                prioridade:
                  type: boolean
                motivo_prioridade:
                  type: string
                  nullable: true
                  description: Motivo informado quando a prioridade legal estiver habilitada.
                procDependente:
                  type: boolean
                100digital:
                  type: boolean
                desinteresse_conciliacao:
                  type: boolean
                distribuicao:
                  type: string
                tipo_distribuicao:
                  type: string
                  writeOnly: true
                  description: |
                    Tipo da distribuição. Utilize `Por dependência` quando se tratar de distribuição por dependência.
                    Quando `Por dependência`, os campos `processo_referencia` e `fundamento_legal` tornam-se obrigatórios.
                    A resposta dos endpoints retorna somente a chave `distribuicao`.
                processo_referencia:
                  type: string
                  nullable: true
                  description: Número do processo utilizado como referência. Deve seguir o formato CNJ (`NNNNNNN-NN.NNNN.N.NN.NNNN`).
                fundamento_legal:
                  type: string
                  nullable: true
                  description: Fundamento legal que justifica a distribuição por dependência.
                atividade_economica:
                  type: string
                  nullable: true
                guia:
                  type: string
                  nullable: true
                querConciliar:
                  type: boolean
                pessoaLei14289:
                  type: boolean
                  nullable: true
                intervencaoMp:
                  type: boolean
                  nullable: true
                naoAplicaValorCausa:
                  type: boolean
                  nullable: true
                renuncia60Salarios:
                  type: boolean
                  nullable: true
                prazoCumprimento261:
                  type: boolean
                  nullable: true
                  description: Indica se o processo possui prazo especial de cumprimento do art. 261 do CPC.
                prazoCumprimento261Descricao:
                  type: string
                  nullable: true
                  description: Texto livre com a descrição do prazo especial de cumprimento do art. 261 do CPC.
                numero_guia:
                  type: array
                  items:
                    type: string
                idpoloativo:
                  description: IDs das partes existentes que compõem o polo ativo do processo.
                  oneOf:
                    - type: integer
                    - type: array
                      items:
                        type: integer
                idpolopassivo:
                  description: IDs das partes existentes que compõem o polo passivo do processo.
                  oneOf:
                    - type: integer
                    - type: array
                      items:
                        type: integer
            example:
              ufTribunal: SP
              tribunal: TJSP
              sistema: pje
              instancia: 1º Grau
              comarca: São Paulo
              competencia: Cível
              area: Direito do Consumidor
              classe: Procedimento Comum Cível
              assunto: Responsabilidade do Fornecedor
              rito: Procedimento Comum
              atividade_economica: SERVIÇOS DE APOIO ADMINISTRATIVO
              tipo_processo: Procedimento Eletrônico
              tipo_justica: Estadual
              valorCausa: 15000.0
              liminar: false
              sigilo: false
              motivo_sigilo: null
              gratuidade: true
              prioridade: false
              motivo_prioridade: null
              procDependente: false
              "100digital": true
              desinteresse_conciliacao: false
              distribuicao: Sorteio
              guia: null
              querConciliar: false
              tipo_distribuicao: "Por dependência"
              processo_referencia: "0000000-00.2024.8.26.0001"
              fundamento_legal: Art. 55 do CPC
              pessoaLei14289: false
              intervencaoMp: false
              naoAplicaValorCausa: false
              renuncia60Salarios: false
              prazoCumprimento261: false
              prazoCumprimento261Descricao: null
              numero_guia:
                - "123456"
              idpoloativo:
                - 123
              idpolopassivo:
                - 456
      responses:
        "200":
          description: Dados atualizados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  peticao:
                    type: object
                    properties:
                      idpeticoes:
                        type: integer
                      idprocessos:
                        type: integer
                        nullable: true
                      hash_peticao:
                        type: string
                        nullable: true
                      hash_processo:
                        type: string
                        nullable: true
                      dados:
                        type: object
                        additionalProperties: true
                        properties:
                          numero_guia:
                            type: array
                            items:
                              type: string
                          idpoloativo:
                            type: array
                            items:
                              type: integer
                          idpolopassivo:
                            type: array
                            items:
                              type: integer
              example:
                status: success
                peticao:
                  idpeticoes: 337051
                  idprocessos: 309466
                  hash_peticao: "3c503e5e-392f-4161-ad25-75876e198b4f"
                  hash_processo: "75f7bc34-ba61-4a0e-83ae-ffadec036526"
                  dados:
