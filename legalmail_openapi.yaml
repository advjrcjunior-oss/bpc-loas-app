                CamposObrigatorios:
                  value:
                    error: Campos id e polo sao obrigatorios
                PoloInvalido:
                  value:
                    error: Polo invalido
                ParteNaoEncontrada:
                  value:
                    error: Parte nao encontrada
        "429":
          description: Limite de requisições excedido (30 por minuto)

  /api/v1/parts/search:
    get:
      tags:
        - Parts
      summary: Buscar partes
      description: |
        Pesquisa partes do workspace pelo polo informado. É obrigatório informar `polo` e `api_key`,
        além de pelo menos um dos campos `nome` ou `documento`.

        O documento deve seguir o formato `xxx.xxx.xxx-xx` (CPF) ou `xx.xxx.xxx/xxxx-xx` (CNPJ).
        O nome aceita busca parcial (LIKE), permitindo acentos ou abreviações. Caso os parâmetros
        `offset` e `limit` não sejam enviados, serão utilizados os valores padrão `offset=0` e
        `limit=50`.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: polo
          required: true
          description: Polo da parte a ser retornada
          schema:
            type: string
            enum: [ativo, passivo]
        - in: query
          name: nome
          required: false
          description: Nome da parte para busca parcial (obrigatório se o documento não for informado)
          schema:
            type: string
        - in: query
          name: documento
          required: false
          description: CPF ou CNPJ no formato `xxx.xxx.xxx-xx` ou `xx.xxx.xxx/xxxx-xx` (obrigatório se o nome não for informado)
          schema:
            type: string
            pattern: "^(\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}|\\d{2}\\.\\d{3}\\.\\d{3}/\\d{4}-\\d{2})$"
        - in: query
          name: offset
          required: false
          description: Offset para paginação
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          required: false
          description: Limite de resultados (máximo 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Lista de partes encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    polo:
                      type: string
                    nome:
                      type: string
                    documento:
                      type: string
                    email:
                      type: string
                    celular:
                      type: string
                    rg:
                      type: string
                    orgao:
                      type: string
                    uf_docto:
                      type: string
                    nacionalidade:
                      type: string
                    estado_civil:
                      type: string
                    profissao:
                      type: string
                    endereco_pais:
                      type: string
                    endereco_cep:
                      type: string
                    endereco_logradouro:
                      type: string
                    endereco_numero:
                      type: string
                    endereco_complemento:
                      type: string
                    endereco_bairro:
                      type: string
                    endereco_cidade:
                      type: string
                    endereco_uf:
                      type: string
                    genero:
                      type: string
                    data_nascimento:
                      type: string
                    uf_nascimento:
                      type: string
                    cidade_nascimento:
                      type: string
                    nome_mae:
                      type: string
                    nome_pai:
                      type: string
                    nit:
                      type: string
                    pis:
                      type: string
                    pasep:
                      type: string
                    personalidade:
                      type: string
                    nao_possui_rg:
                      type: string
                    nao_possui_cpf:
                      type: string
                    citacao_online:
                      type: integer
                      enum: [0, 1]
                      description: |
                        - Aceito **somente para o polo passivo** (`polo: passivo`).
                        - O valor `1` **somente é permitido** quando o campo `nome` corresponder,
                          de forma case-insensitive, a:
                            - "INSTITUTO NACIONAL DO SEGURO SOCIAL"
                            - "INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS"
                        - Para qualquer outro nome ou quando `polo` não for `passivo`,
                          o valor será ignorado ou tratado como `0`.
                    nome_orgao_vinculacao:
                      type: string
                      description: |
                        - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
                    cnpj_orgao_vinculacao:
                      type: string
                      description: |
                        - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
                    email_orgao_vinculacao:
                      type: string
                      description: |
                        - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
              example:
                - id: 2
                  polo: passivo
                  nome: Empresa Exemplo
                  documento: "12.345.678/0001-90"
                  email: contato@empresa.com
                  celular: "(11) 90000-0000"
                  rg: "1234567"
                  orgao: SSP
                  uf_docto: SP
                  nacionalidade: Brasileiro
                  estado_civil: Solteiro
