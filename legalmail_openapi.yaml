              example:
                status: success
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
              examples:
                campo_obrigatorio:
                  summary: Campo obrigatório ausente
                  value:
                    error: "Missing field: fk_peca"
                peca_invalida:
                  summary: Peça não disponível para a petição
