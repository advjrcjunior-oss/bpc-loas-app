                    rito: ""
                    assunto: "DIREITO PENAL > Crimes contra o Patrimônio > Dano (3426)"
                    tipo_processo: ""
                    tipo_justica: ""
                    valorCausa: "0.00"
                    liminar: 0
                    sigilo: 0
                    gratuidade: 0
                    prioridade: 0
                    motivo_prioridade: ""
                    '100digital': 0
                    desinteresse_conciliacao: 0
                    pessoaLei14289: 0
                    intervencaoMp: 0
