  /api/v1/petition/file:
    post:
      tags:
        - Petitions
      summary: Enviar arquivo principal da petição
      description: |
        Upload do documento principal da petição.
        Somente arquivos em PDF sao aceitos.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idpeticoes
          required: true
          description: ID da petição
          schema:
            type: integer
        - in: query
          name: idprocessos
          required: true
          description: ID do processo
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Resultado do upload
          content:
            application/json:
              schema:
                type: string
        "401":
          description: API key not provided
  /api/v1/petition/attachments:
    post:
      tags:
        - Attachments
      summary: Enviar anexos da petição
      description: |
        Upload de anexos para a petição.
        Somente arquivos em PDF sao aceitos.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: idpeticoes
          required: true
          description: ID da petição
          schema:
            type: integer
        - in: query
          name: fk_documentos_tipos
          required: true
          description: Tipo do documento anexado (conforme /api/v1/petition/attachment/types)
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Resultado do upload
          content:
            application/json:
              schema:
                oneOf:
                  - type: string
                    description: Mensagem de sucesso (String JSON)
                    example: "success"
                  - type: object
                    description: Erro de validação de regra de negócio (Status da petição)
                    properties:
                      status:
                        type: string
                      message:
                        type: string
                    example:
                      status: error
                      message: "O status da petição não permite adicionar anexos."
        "400":
          description: Requisição inválida, parâmetros ausentes ou erro no upload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  error:
                    type: string
              examples:
                campos_ausentes:
                  summary: Parâmetros obrigatórios não enviados
                  value:
                    error: "Missing fields: idpeticoes are required"
                tipo_invalido:
                  summary: Tipo de documento não permitido para a petição
                  value:
                    status: error
                    message: "Tipo de documento informado não é válido para a petição. Consulte os tipos disponíveis para a petição em /api/v1/petition/attachment/types."
                erro_upload:
                  summary: Falha no envio ou conversão do arquivo
                  value:
                    error: "Erro ao enviar arquivo"
        "401":
          description: API key inválida ou não informada
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                error: API key invalid
        "405":
          description: Método não permitido (esperado POST)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Method not allowed
