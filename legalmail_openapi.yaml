                  nit: "123456"
                  pis: "12345678900"
                  pasep: "12345678900"
                  personalidade: Pessoa fisica
                  nao_possui_rg: "0"
                  nao_possui_cpf: "0"
                  citacao_online: 0
                  nome_orgao_vinculacao: "Tribunal de Justiça de São Paulo"
                  cnpj_orgao_vinculacao: "12.345.678/0001-90"
                  email_orgao_vinculacao: "contato@tjsp.jus.br"
  /api/v1/users:
    get:
      tags:
        - Users
      summary: Listar usuários cadastrados
      description: Retorna os membros com todos os campos exigidos no cadastro e na atualização
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idusuarios:
                      type: integer
                    nome:
                      type: string
                    email:
                      type: string
                      format: email
                    perfil:
                      type: string
                      enum: [operador, administrador]
                    cpf:
                      type: string
                      description: Formato xxx.xxx.xxx-xx (CPF válido)
                    rg:
                      type: string
                    orgao_expedidor:
                      type: string
                    data_nascimento:
                      type: string
                      description: Formato dd/mm/yyyy
                    telefone:
                      type: string
                    oab:
                      type: string
                    uf:
                      type: string
              example:
                - idusuarios: 1
                  nome: Usuário Exemplo
                  email: exemplo@teste.com
                  perfil: operador
                  cpf: "123.456.789-09"
                  rg: "12345678"
                  orgao_expedidor: SSP
                  data_nascimento: "01/01/1990"
                  telefone: "(11) 91234-5678"
                  oab: "123456"
                  uf: SP
        "401":
          description: API key not provided

    post:
      tags:
        - Users
      summary: Criar usuário
      description: |
        Cria um novo membro no workspace.

        Observações:

        - A senha deve ser enviada criptografada em MD5.
        - O e-mail precisa ser válido.
        - O perfil pode ser `operador` ou `administrador`.
        - O telefone deve estar no formato `(xx) xxxxx-xxxx`.
        - O CPF deve seguir o padrão `xxx.xxx.xxx-xx` e ser válido.
        - A data de nascimento deve estar no formato `dd/mm/yyyy`.
        - O `orgao_expedidor` deve ser obtido na rota `/api/v1/issuing-agencies`.
        - A OAB e a UF são opcionais; caso informadas, a OAB deve conter 6 dígitos e a UF possuir 2 letras maiúsculas de um estado válido. Essas informações serão salvas na tabela `usuarios_oabs`.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                email:
                  type: string
                  format: email
                senha:
                  type: string
                  description: Senha em MD5
                perfil:
                  type: string
                  description: Tipo de usuário, `operador` ou `administrador`
                  enum: [operador, administrador]
                cpf:
                  type: string
                  description: Formato xxx.xxx.xxx-xx (CPF válido)
                rg:
                  type: string
                orgao_expedidor:
                  type: string
                  description: Código de órgão expedidor da rota `/api/v1/issuing-agencies`
                data_nascimento:
                  type: string
                  description: Formato dd/mm/yyyy
                telefone:
                  type: string
                  description: Formato (xx) xxxxx-xxxx
                oab:
                  type: string
                  description: Número com 6 dígitos
                uf:
                  type: string
                  description: Sigla do estado em 2 letras maiúsculas
              required:
                [
                  nome,
                  email,
                  senha,
                  perfil,
                  cpf,
                  rg,
                  orgao_expedidor,
                  data_nascimento,
                  telefone,
                ]
      responses:
        "201":
          description: Usuário criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  idusuarios:
                    type: integer
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: API key not found
        "500":
          description: Falha ao criar usuário

    put:
      tags:
        - Users
      summary: Atualizar usuário
      description: |
        Atualiza dados do membro.

        - Se a senha for enviada, deve estar em MD5.
        - O e-mail precisa ser válido.
        - O perfil pode ser `operador` ou `administrador`.
        - O telefone deve seguir o formato `(xx) xxxxx-xxxx`.
        - O CPF deve estar no padrão `xxx.xxx.xxx-xx` e ser válido.
        - A data de nascimento deve estar no formato `dd/mm/yyyy`.
        - A OAB e a UF são opcionais; caso informadas, a OAB deve ter 6 dígitos e a UF conter 2 letras maiúsculas válidas.
        - O `orgao_expedidor` deve ser obtido na rota `/api/v1/issuing-agencies`.
        - Somente os campos enviados serão alterados.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idusuarios:
                  type: integer
                nome:
                  type: string
                email:
                  type: string
                  format: email
                senha:
                  type: string
                  description: Senha em MD5
                perfil:
                  type: string
                  description: Tipo de usuário, `operador` ou `administrador`
                  enum: [operador, administrador]
                cpf:
                  type: string
                  description: Formato xxx.xxx.xxx-xx (CPF válido)
                rg:
                  type: string
                orgao_expedidor:
                  type: string
                  description: Código de órgão expedidor da rota `/api/v1/issuing-agencies`
                data_nascimento:
                  type: string
                  description: Formato dd/mm/yyyy
                telefone:
                  type: string
                  description: Formato (xx) xxxxx-xxxx
                oab:
                  type: string
                  description: Número com 6 dígitos (opcional)
                uf:
                  type: string
                  description: Sigla do estado em 2 letras maiúsculas (obrigatória se OAB for enviada)
              required: [idusuarios]
      responses:
        "200":
          description: Usuário atualizado
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Usuário ou API key não encontrado

    delete:
      tags:
        - Users
      summary: Remover usuário
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idusuarios:
                  type: integer
              required: [idusuarios]
      responses:
        "200":
          description: Usuário removido
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Usuário ou API key não encontrado

  /api/v1/docs:
    get:
      tags:
        - Docs Generator
      summary: Listar documentos do gerador
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - idgerador_documentos: 10
                  nome: Documento exemplo
                  hash: "hash_exemplo"
                  created_at: "2024-01-01 10:00:00"
        "401":
          description: API key not provided
        "404":
          description: API key not found

    post:
      tags:
        - Docs Generator
      summary: Criar documento do gerador
      description: |
        Envia os valores que serão aplicados nos placeholders do modelo.
        No front (Gerador de Documentos), as variáveis são criadas na configuração do modelo
        e inseridas no texto com o formato `{{Nome da variavel}}`.
        Na API, o objeto `variaveis` deve usar exatamente o mesmo nome cadastrado no front.
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idgerador_documentos_modelos:
                  type: integer
                nome:
                  type: string
                variaveis:
                  type: object
                  description: |
                    Mapa `nome_da_variavel` -> `valor` com os dados que serão substituídos no documento.
                    Os nomes devem corresponder às variáveis criadas no front e usadas no modelo.
                  example:
                    Nome do cliente: "Maria da Silva"
                    Numero do processo: "0000000-00.2024.1.00.0000"
                    Valor da causa: "R$ 10.000,00"
                    Vara: "2ª Vara Cível"
              required:
                - idgerador_documentos_modelos
      responses:
        "200":
          description: Documento criado
          content:
            application/json:
              schema:
                type: object
              example:
                status: success
                document_id: 123
                hash: "hash_exemplo"
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Modelo não encontrado
        "500":
          description: Erro ao criar documento


    delete:
      tags:
        - Docs Generator
      summary: Excluir documento do gerador
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
              required:
                - id
      responses:
        "200":
          description: Documento excluído
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Documento não encontrado


  /api/v1/docs/download:
    get:
      tags:
        - Docs Generator
      summary: Baixar documento gerado (PDF ou DOCX)
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
        - in: query
          name: id
          required: true
