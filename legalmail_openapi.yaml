                            type: array
                            items:
                              type: string
                          idpoloativo:
                            type: array
                            items:
                              type: integer
                          idpolopassivo:
                            type: array
                            items:
                              type: integer
              example:
                status: success
                peticao:
                  idpeticoes: 337051
                  idprocessos: 309466
                  hash_peticao: "3c503e5e-392f-4161-ad25-75876e198b4f"
                  hash_processo: "75f7bc34-ba61-4a0e-83ae-ffadec036526"
