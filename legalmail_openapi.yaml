                        - "INSTITUTO NACIONAL DO SEGURO SOCIAL"
                        - "INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS"
                    - Para qualquer outro nome ou quando `polo` não for `passivo`,
                      o valor será ignorado ou tratado como `0`.
                nome_orgao_vinculacao:
                  type: string
                  description: |
                    - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
                cnpj_orgao_vinculacao:
                  type: string
                  description: |
                    - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
                email_orgao_vinculacao:
                  type: string
                  description: |
                    - Aceito **somente para:** polo passivo (`polo: passivo`), personalidade "Autoridade Coatora" e sistema "PJe" (exceto o PJe do TRF-1 e TRF-5).
              required:
                - id
                - polo
                - nome
                - documento
      responses:
        "200":
          description: Parte atualizada
          content:
