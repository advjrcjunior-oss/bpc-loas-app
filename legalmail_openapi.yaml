        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Documento ou API key não encontrado
        "500":
          description: Erro ao gerar arquivo


  /api/v1/docs/models:
    get:
      tags:
        - Docs Generator
      summary: Listar modelos do gerador
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      responses:
        "200":
          description: Lista de modelos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              example:
                - idgerador_documentos_modelos: 1
                  nome: Modelo base
                  json_variaveis:
                    - "Nome do cliente"
                    - "Numero do processo"
                  created_at: "2024-01-01 10:00:00"
        "401":
          description: API key not provided
        "404":
          description: API key not found

    delete:
      tags:
        - Docs Generator
      summary: Excluir modelo do gerador
      parameters:
        - in: query
          name: api_key
          required: true
          description: Chave de API do workspace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idgerador_documentos_modelos:
                  type: integer
              required:
                - idgerador_documentos_modelos
      responses:
        "200":
          description: Modelo excluído
        "400":
          description: Dados inválidos
        "401":
          description: API key not provided
        "404":
          description: Modelo não encontrado
