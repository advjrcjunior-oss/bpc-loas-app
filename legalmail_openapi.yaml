              schema:
                type: object
              example:
                error: API key not found
        "400":
          description: Erro de validação ou parte inexistente
          content:
            application/json:
              schema:
                type: object
              examples:
                PayloadInvalido:
                  value:
                    error: Payload invalido
                CamposObrigatorios:
                  value:
                    error: Campos id e polo sao obrigatorios
                PoloInvalido:
                  value:
                    error: Polo invalido
                ErroValidacao:
                  value:
                    error: Documento invalido
                ParteNaoEncontrada:
                  value:
                    error: Parte nao encontrada no polo informado
        "429":
          description: Limite de requisições excedido (30 por minuto)
    delete:
      tags:
        - Parts
      summary: Deletar parte
      description: Remove a parte informada. Os campos **id** e **polo** são obrigatórios para a exclusão.
      parameters:
        - in: query
          name: api_key
          required: true
